name: Regenerate Angular security lockfile

on:
  push:
    branches:
      - automation/angular-node-forge-yaml-security

permissions:
  contents: write

jobs:
  regenerate-and-verify:
    if: ${{ !contains(github.event.head_commit.message || '', '[validated-security-lockfile]') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v6
        with:
          ref: automation/angular-node-forge-yaml-security
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Update targeted transitive dependencies
        run: |
          npm install --global npm@8.19.4
          rm -rf node_modules
          npm update node-forge yaml --package-lock-only --lockfile-version=1 --ignore-scripts
      - name: Verify vulnerable versions are removed
        run: |
          node <<'NODE'
          const lock = require('./package-lock.json');
          const versions = { 'node-forge': [], yaml: [] };
          const walk = deps => {
            for (const [name, value] of Object.entries(deps || {})) {
              if (name in versions) versions[name].push(value.version);
              walk(value.dependencies);
            }
          };
          walk(lock.dependencies);
          console.log(versions);
          if (!versions['node-forge'].includes('1.4.0') || versions['node-forge'].includes('1.3.1')) process.exit(1);
          if (!versions.yaml.includes('1.10.3') || versions.yaml.includes('1.10.2')) process.exit(1);
          NODE
      - name: Verify clean install
        run: npm ci
      - name: Verify Angular build
        run: npm run build
      - name: Commit validated lockfile
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add angular/package-lock.json
          git rm .github/workflows/regenerate-angular-crypto-yaml-lockfile.yml
          git commit -m "fix(deps): patch node-forge and yaml [validated-security-lockfile]"
          git push origin HEAD:automation/angular-node-forge-yaml-security
